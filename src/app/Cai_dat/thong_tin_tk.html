<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt thông tin tài khoản VANTA</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --dark: #1e293b;
            --yellow: #facc15;
        }

        body {
            background: #f8f9fa;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 240px;
            padding: 20px;
            background: var(--dark);
        }

        .main {
            margin-left: 240px;
            padding: 24px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--yellow);

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 30px;
            font-weight: bold;
        }

        .nav-link {
            color: #94a3b8;
            border-radius: 8px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #2d3748;
            color: #ffffff;
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: auto;

            border-radius: 50%;
            background: var(--yellow);

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 52px;
        }

        .card {
            border: none;
            border-radius: 18px;
        }
    </style>
</head>

<body>

    <!-- ================= Sidebar ================= -->
    <aside class="sidebar d-flex flex-column justify-content-between">

        <div>

            <!-- Logo -->
            <div class="d-flex align-items-center mb-4">

                <div class="logo me-3">
                    V
                </div>

                <div>
                    <h4 class="text-white m-0">
                        Vanta
                    </h4>

                    <small class="text-secondary">
                        LIFE MADE EASIER
                    </small>
                </div>

            </div>

            <!-- Menu -->
            <nav class="nav flex-column gap-2">

                <a class="nav-link"
                   href="trang_chu.html">
                    <i class="bi bi-house-door-fill me-2"></i>
                    Trang chủ
                </a>

                <a class="nav-link"
                   href="#">
                    <i class="bi bi-briefcase-fill me-2"></i>
                    Đặt dịch vụ
                </a>

                <a class="nav-link"
                   href="#">
                    <i class="bi bi-clock-history me-2"></i>
                    Lịch sử
                </a>

                <a class="nav-link"
                   href="#">
                    <i class="bi bi-star me-2"></i>
                    Đánh giá
                </a>

                <a class="nav-link"
                   href="#">
                    <i class="bi bi-robot me-2"></i>
                    Trợ lý AI
                </a>

                <a class="nav-link active"
                   href="thong_tin_tk.html">
                    <i class="bi bi-gear me-2"></i>
                    Cài đặt
                </a>

            </nav>

        </div>

    </aside>

    <!-- ================= Main Content ================= -->
    <main class="main">

        <!-- Topbar -->
        <div class="card shadow-sm mb-4">

            <div class="card-body d-flex justify-content-between align-items-center">

                <div class="input-group w-50">

                    <span class="input-group-text">
                        <i class="bi bi-search"></i>
                    </span>

                    <input type="text"
                           class="form-control"
                           placeholder="Tìm kiếm">

                </div>

                <div>

                    <i class="bi bi-bell fs-5 me-3"></i>

                    <span class="badge bg-warning text-dark rounded-circle p-3">
                        K
                    </span>

                </div>

            </div>

        </div>

        <!-- Card thông tin -->
        <div class="card shadow">

            <div class="card-body p-4">

                <h3 class="mb-4">
                    <i class="bi bi-person-circle me-2"></i>
                    Cài đặt thông tin tài khoản
                </h3>

                <!-- Avatar -->
                <div class="text-center mb-4">

                    <div class="avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>

                    <button class="btn btn-outline-dark mt-3">
                        <i class="bi bi-camera me-2"></i>
                        Đổi ảnh đại diện
                    </button>

                </div>

                <!-- Form -->
                <form class="row g-3">

                    <div class="col-md-6">

                        <label class="form-label">
                            Họ và tên
                        </label>

                        <input type="text"
                               class="form-control"
                               value="Khải Ái">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               value="user@vanta.vn">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Số điện thoại
                        </label>

                        <input type="text"
                               class="form-control"
                               value="0901234567">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Ngày sinh
                        </label>

                        <input type="date"
                               class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Giới tính
                        </label>

                        <select class="form-select">
                            <option>Nam</option>
                            <option>Nữ</option>
                            <option>Khác</option>
                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Thành phố
                        </label>

                        <input type="text"
                               class="form-control">

                    </div>

                    <div class="col-12">

                        <label class="form-label">
                            Địa chỉ
                        </label>

                        <textarea class="form-control"
                                  rows="3"></textarea>

                    </div>

                    <hr class="my-4">

                    <!-- Đổi mật khẩu -->
                    <h5>
                        <i class="bi bi-key me-2"></i>
                        Đổi mật khẩu
                    </h5>

                    <div class="col-md-4">
                        <input type="password"
                               class="form-control"
                               placeholder="Mật khẩu hiện tại">
                    </div>

                    <div class="col-md-4">
                        <input type="password"
                               class="form-control"
                               placeholder="Mật khẩu mới">
                    </div>

                    <div class="col-md-4">
                        <input type="password"
                               class="form-control"
                               placeholder="Xác nhận mật khẩu">
                    </div>

                    <hr class="my-4">

                    <!-- Cài đặt -->
                    <h5>
                        <i class="bi bi-shield-lock me-2"></i>
                        Cài đặt
                    </h5>

                    <div class="form-check form-switch">

                        <input class="form-check-input"
                               type="checkbox"
                               checked>

                        <label class="form-check-label">
                            Nhận thông báo
                        </label>

                    </div>

                    <div class="form-check form-switch">

                        <input class="form-check-input"
                               type="checkbox"
                               checked>

                        <label class="form-check-label">
                            Xác thực hai bước
                        </label>

                    </div>

                    <!-- Buttons -->
                    <div class="text-end mt-4">

                        <button type="reset"
                                class="btn btn-outline-secondary me-2">
                            Hủy
                        </button>

                        <button type="submit"
                                class="btn btn-warning">
                            <i class="bi bi-check-circle me-2"></i>
                            Lưu thay đổi
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

</body>
</html>
